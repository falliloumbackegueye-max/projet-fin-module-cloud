---
# ============================================================
# Playbook Principal — Architecture 3-Tiers
# ============================================================

# ── 1. Gateway / Firewall ────────────────────────────────────
- name: Configure Gateway (Routing + iptables)
  hosts: gateway
  become: true
  vars:
    dmz_iface: enp0s8
    lan_iface: enp0s9
    wan_iface: enp0s3
  tasks:

    - name: Activer le forwarding IPv4 (sysctl)
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true

    - name: Persister ip_forward dans /etc/sysctl.conf
      lineinfile:
        path: /etc/sysctl.conf
        regexp: "^#?net.ipv4.ip_forward"
        line: "net.ipv4.ip_forward=1"

    - name: Installer iptables-persistent
      apt:
        name: iptables-persistent
        state: present
        update_cache: true

    - name: Règle NAT — masquerade sortie WAN
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        out_interface: "{{ wan_iface }}"
        jump: MASQUERADE

    # ── Internet → DMZ (HTTP/HTTPS entrant) ──────────────────
    - name: Autoriser Internet → DMZ port 80
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ wan_iface }}"
        out_interface: "{{ dmz_iface }}"
        protocol: tcp
        destination_port: "80"
        ctstate: NEW,ESTABLISHED,RELATED
        jump: ACCEPT

    - name: Autoriser Internet → DMZ port 443
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ wan_iface }}"
        out_interface: "{{ dmz_iface }}"
        protocol: tcp
        destination_port: "443"
        ctstate: NEW,ESTABLISHED,RELATED
        jump: ACCEPT

    # ── DMZ → Internet (npm, git, mises à jour) ──────────────
    - name: Autoriser DMZ → Internet
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ dmz_iface }}"
        out_interface: "{{ wan_iface }}"
        ctstate: NEW,ESTABLISHED,RELATED
        jump: ACCEPT

    # ── LAN → Internet (mises à jour) ────────────────────────
    - name: Autoriser LAN → Internet
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ lan_iface }}"
        out_interface: "{{ wan_iface }}"
        ctstate: NEW,ESTABLISHED,RELATED
        jump: ACCEPT

    # ── LAN → DMZ (DB peut accéder au Web) ───────────────────
    - name: Autoriser LAN → DMZ
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ lan_iface }}"
        out_interface: "{{ dmz_iface }}"
        ctstate: NEW,ESTABLISHED,RELATED
        jump: ACCEPT

    # ── Retour des connexions établies ────────────────────────
    - name: Autoriser retour connexions établies
      ansible.builtin.iptables:
        chain: FORWARD
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT

    # ── DMZ → LAN (INTERDIT) ─────────────────────────────────
    - name: Bloquer DMZ → LAN
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ dmz_iface }}"
        out_interface: "{{ lan_iface }}"
        jump: DROP

    # ── Politique par défaut ──────────────────────────────────
    - name: Politique par défaut FORWARD → DROP
      ansible.builtin.iptables:
        chain: FORWARD
        policy: DROP

    - name: Bloquer port 3306 depuis toute autre source
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "3306"
        jump: DROP

    - name: Sauvegarder les règles iptables
      community.general.iptables_state:
        state: saved
        path: /etc/iptables/rules.v4

# ── 2. Serveur Web (DMZ) ─────────────────────────────────────
- name: Configure Web Server (Nginx + Site Vitrine Tailwind/Vite)
  hosts: webservers
  become: true
  vars:
    site_repo: "https://github.com/Falilou66/Portfolio-Engineer-Falilou.git"
    site_dir: /var/www/site
  tasks:

    - name: Installer les paquets nécessaires
      apt:
        name:
          - nginx
          - git
          - curl
        state: present
        update_cache: true

    - name: Ajouter le dépôt NodeSource (Node 20)
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Installer Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Créer le répertoire du site
      file:
        path: "{{ site_dir }}"
        state: directory
        owner: falilou
        group: falilou
        mode: "0755"

    - name: Cloner le dépôt du site vitrine
      git:
        repo: "{{ site_repo }}"
        dest: "{{ site_dir }}"
        version: main
        force: true
      become_user: falilou

    - name: Installer les dépendances npm
      shell: npm install
      args:
        chdir: "{{ site_dir }}"
      become_user: falilou

    - name: Builder le site avec Vite
      shell: npm run build
      args:
        chdir: "{{ site_dir }}"
      become_user: falilou

    - name: Configurer Nginx pour servir le dossier dist/
      copy:
        dest: /etc/nginx/sites-available/site
        content: |
          server {
              listen 80;
              server_name _;
              root {{ site_dir }}/dist;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }
          }
        mode: "0644"

    - name: Activer le site Nginx
      file:
        src: /etc/nginx/sites-available/site
        dest: /etc/nginx/sites-enabled/site
        state: link

    - name: Désactiver le site default de Nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Tester la configuration Nginx
      shell: nginx -t
      changed_when: false

    - name: Redémarrer et activer Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: true

# ── 3. Serveur Base de Données (LAN) ─────────────────────────
- name: Configure Database Server (MySQL)
  hosts: dbservers
  become: true
  vars:
    db_name: appdb
    db_user: appuser
    db_password: "{{ lookup('env', 'DB_PASSWORD') | default('ChangeMe123!', true) }}"
    db_bind_address: "192.168.100.10"
    webserver_ip: "192.168.10.10"
  tasks:

    - name: Installer MySQL et PyMySQL
      apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
        update_cache: true

    - name: Démarrer et activer MySQL
      systemd:
        name: mysql
        state: started
        enabled: true

    - name: Configurer MySQL pour écouter sur l'IP du DBserver
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: "^bind-address"
        line: "bind-address = {{ db_bind_address }}"
      notify: Restart MySQL

    - name: Créer la base de données applicative
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Créer l'utilisateur applicatif (accès restreint au Webserver)
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        host: "{{ webserver_ip }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Supprimer les utilisateurs anonymes
      community.mysql.mysql_user:
        name: ""
        host_all: true
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Autoriser port 3306 depuis le Webserver uniquement
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "3306"
        source: "{{ webserver_ip }}"
        jump: ACCEPT

    - name: Bloquer port 3306 depuis toute autre source
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "3306"
        jump: DROP

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysql
        state: restarted

