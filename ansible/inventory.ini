[gateway]
192.168.100.1 ansible_user=vagrant ansible_ssh_private_key_file=.vagrant/machines/gateway/virtualbox/private_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[webservers]
192.168.100.10 ansible_user=vagrant ansible_ssh_private_key_file=.vagrant/machines/webserver/virtualbox/private_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[dbservers]
192.168.10.10 ansible_user=vagrant ansible_ssh_private_key_file=.vagrant/machines/dbserver/virtualbox/private_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[all:vars]
ansible_python_interpreter=/usr/bin/python3
