name: CI/CD — Architecture 3-Tiers

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
  ANSIBLE_FORCE_COLOR: "1"

jobs:

  lint:
    name: "🔍 Lint YAML (Ansible)"
    runs-on: self-hosted
    steps:

      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer yamllint
        run: pip3 install yamllint --quiet

      - name: Lint — Playbook Ansible site.yml
        run: |
          echo "=== yamllint ansible/site.yml ==="
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 120}}}' \
            ansible/site.yml \
            .github/workflows/deploy.yml

      - name: Lint — ansible-lint
        run: |
          pip3 install ansible ansible-lint --quiet
          cd ansible
          ansible-lint site.yml --profile=min || true

  deploy:
    name: "🚀 Deploy (Ansible Playbook)"
    runs-on: self-hosted
    needs: lint
    if: >
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name == 'push'

    steps:

      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Ansible et collections requises
        run: |
          pip3 install ansible --quiet
          ansible-galaxy collection install \
            ansible.posix \
            community.general \
            community.mysql \
            --force-with-deps

      - name: Test de connectivité SSH (ping Ansible)
        run: ansible all -i ansible/inventory.ini -m ping

      - name: Exécuter le Playbook complet
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/site.yml \
            --diff \
            -v
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Vérification post-déploiement — Nginx répond
        run: |
          echo "=== Test HTTP sur le serveur Web ==="
          curl --fail --silent --max-time 10 http://192.168.56.11 \
            && echo "✅ Nginx OK" \
            || echo "⚠️  Nginx injoignable depuis le runner"

      - name: Résumé du déploiement
        if: always()
        run: |
          echo "────────────────────────────────────"
          echo "  Déploiement terminé : $(date)"
          echo "  Commit : ${{ github.sha }}"
          echo "  Auteur : ${{ github.actor }}"
          echo "────────────────────────────────────"
